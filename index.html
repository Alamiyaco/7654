<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة المتابعة والمناسبات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-glow glow-1"></div>
  <div class="background-glow glow-2"></div>

  <header class="hero">
    <div>
      <p class="eyebrow">بوابة تفاعلية مرتبطة بـ Google Sheets</p>
      <h1>المتابعة والمناسبات</h1>
      <p class="subtitle" id="pageSubtitle">لوحة موحدة لعرض التقييمات والمناسبات العامة ومناسبات الموظفين وأعياد الميلاد من الشيت مباشرة.</p>
    </div>
    <div class="hero-actions">
      <div class="date-box">
        <span>تاريخ اليوم</span>
        <strong id="todayDateText">-</strong>
      </div>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <section class="controls controls-grid">
    <div class="search-box">
      <label for="searchInput">بحث</label>
      <input id="searchInput" type="text" placeholder="ابحث باسم الموظف، القسم، المناسبة أو الملاحظة..." />
    </div>

    <div class="filter-box" id="categoryFilterWrap">
      <label for="categoryFilter">التصنيف</label>
      <select id="categoryFilter">
        <option value="">الكل</option>
      </select>
    </div>

    <div class="filter-box" id="windowFilterWrap">
      <label for="windowFilter">الفترة</label>
      <select id="windowFilter">
        <option value="0">اليوم فقط</option>
        <option value="7">7 أيام</option>
        <option value="14" selected>14 يوم</option>
        <option value="30">30 يوم</option>
        <option value="9999">كل القادم</option>
      </select>
    </div>
  </section>

  <section class="stats" id="statsSection"></section>

  <main id="viewRoot"></main>

  <template id="evaluationCardTemplate">
    <article class="employee-card">
      <div class="employee-main">
        <div>
          <h3 class="employee-name"></h3>
          <p class="employee-meta"></p>
        </div>
        <span class="badge eval-type"></span>
      </div>
      <div class="employee-footer">
        <div class="date-pill"></div>
        <div class="days-left"></div>
      </div>
    </article>
  </template>

  <template id="eventCardTemplate">
    <article class="event-card">
      <div class="event-top">
        <div>
          <h3 class="event-title"></h3>
          <p class="event-meta"></p>
        </div>
        <span class="badge soft-badge event-badge"></span>
      </div>
      <div class="event-body"></div>
      <div class="employee-footer">
        <div class="date-pill"></div>
        <div class="days-left"></div>
      </div>
    </article>
  </template>

  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>

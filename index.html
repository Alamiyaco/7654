<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التقييمات والمناسبات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Changa:wght@500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-grid"></div>

  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">لوحة موحدة مرتبطة مباشرةً بالشيت</p>
        <h1 id="pageTitle">متابعة التقييمات</h1>
        <p class="hero-text" id="pageSubtitle">
          منصة واحدة لعرض التقييمات، المناسبات العامة، مناسبات الموظفين، وأعياد الميلاد مع تحديث مباشر من Google Sheets.
        </p>
      </div>

      <div class="hero-side">
        <div class="info-card">
          <span class="info-label">تاريخ اليوم</span>
          <strong id="todayDateText">-</strong>
        </div>

        <div class="info-card">
          <span class="info-label">حالة الربط</span>
          <div class="source-stack">
            <strong id="sourceModeText">جاري التحميل</strong>
            <span id="sourceMetaText">بانتظار أول مزامنة</span>
          </div>
          <button class="refresh-btn" id="refreshButton" type="button">تحديث الآن</button>
        </div>
      </div>
    </header>

    <nav class="tabs" id="tabsNav" aria-label="التنقل بين الصفحات"></nav>

    <section class="toolbar">
      <div class="field search-field">
        <label for="searchInput">بحث</label>
        <input id="searchInput" type="text" placeholder="ابحث بالاسم أو القسم أو المناسبة...">
      </div>

      <div class="field" id="dynamicFilterBox">
        <label for="dynamicFilter" id="dynamicFilterLabel">فلترة</label>
        <select id="dynamicFilter">
          <option value="">الكل</option>
        </select>
      </div>

      <div class="field" id="windowFilterBox">
        <label for="windowFilter" id="windowFilterLabel">الفترة القادمة</label>
        <select id="windowFilter"></select>
      </div>
    </section>

    <section class="stats-grid" id="statsSection"></section>

    <section class="content-shell">
      <div class="content-head">
        <div>
          <p class="content-kicker">ملخص الصفحة</p>
          <h2 id="contentHeading">نظرة سريعة</h2>
          <p id="contentDescription">جاري تجهيز البيانات...</p>
        </div>
        <div class="legend" id="pageLegend"></div>
      </div>

      <main id="pageContent">
        <div class="loading-box">جاري تحميل البيانات...</div>
      </main>
    </section>
  </div>

  <template id="evaluationCardTemplate">
    <article class="data-card evaluation-card">
      <div class="card-top">
        <div>
          <h3 class="card-title"></h3>
          <p class="card-meta"></p>
        </div>
        <span class="badge"></span>
      </div>
      <div class="card-body">
        <p class="card-note"></p>
      </div>
      <div class="card-footer">
        <span class="date-pill"></span>
        <span class="status-pill"></span>
      </div>
    </article>
  </template>
